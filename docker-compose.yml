version: '3.8'

# ============================================================
# DOCKER COMPOSE — LOCAL DEVELOPMENT
# Run: docker compose up
# Stop: docker compose down -v
# ============================================================

services:

  # ── MongoDB (local database) ──────────────────────────────
  mongo:
    image: mongo:7-jammy
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # ── Backend (Node.js/Express API) ─────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '5000:5000'
    env_file:
      - backend/.env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/lms_dev
    depends_on:
      - mongo
    restart: unless-stopped

  # ── Frontend (React/Vite served by Nginx) ─────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
    ports:
      - '5173:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data:
