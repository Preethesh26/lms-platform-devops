version: '3.8'

# ============================================================
# DOCKER COMPOSE — LOCAL DEVELOPMENT
# Uses MongoDB Atlas (lms_dev) — no local mongo container needed
# Run: docker compose up
# Stop: docker compose down
# ============================================================

services:

  # ── Backend (Node.js/Express API) ─────────────────────────
  # Connects to Atlas lms_dev database via backend/.env
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '5000:5000'
    env_file:
      - backend/.env        # MONGODB_URI points to Atlas lms_dev
    restart: unless-stopped

  # ── Frontend (React/Vite served by Nginx) ─────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
    ports:
      - '5173:80'
    depends_on:
      - backend
    restart: unless-stopped
