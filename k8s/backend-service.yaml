# ============================================================
# BACKEND SERVICE — LOCAL DEV
# Exposes the backend pods inside the cluster
# Access via: kubectl port-forward svc/lms-backend 5000:5000
# ============================================================

apiVersion: v1
kind: Service
metadata:
  name: lms-backend
  namespace: lms-production
spec:
  type: ClusterIP
  selector:
    app: lms-backend
  ports:
    - port: 5000
      targetPort: 5000
