# ============================================================
# BACKEND CONFIGMAP — LOCAL DEV
# Non-sensitive config for each local namespace
# ============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: lms-production
data:
  PORT: "5000"
  NODE_ENV: "production"
  FRONTEND_URL: "http://localhost:8080"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: lms-staging
data:
  PORT: "5000"
  NODE_ENV: "staging"
  FRONTEND_URL: "http://localhost:8080"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: lms-dev
data:
  PORT: "5000"
  NODE_ENV: "development"
  FRONTEND_URL: "http://localhost:5173"
