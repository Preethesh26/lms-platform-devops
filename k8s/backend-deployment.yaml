# ============================================================
# BACKEND DEPLOYMENT — LOCAL DEV
# Jenkins replaces GIT_SHA with the actual commit hash
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: lms-backend
  namespace: lms-production
spec:
  replicas: 2
  revisionHistoryLimit: 5        # keep 5 versions for rollback
  selector:
    matchLabels:
      app: lms-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0          # never take a pod down before new one is up
      maxSurge: 1
  template:
    metadata:
      labels:
        app: lms-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      imagePullSecrets:
        - name: dockerhub-pull-secret
      containers:
        - name: backend
          image: DOCKERHUB_USERNAME/lms-backend:GIT_SHA  # Jenkins replaces this
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: backend-config    # non-sensitive config
            - secretRef:
                name: backend-secrets   # passwords and API keys
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 5
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
