# ============================================================
# FRONTEND SERVICE — LOCAL DEV
# Exposes the frontend pods inside the cluster
# Access via: kubectl port-forward svc/lms-frontend 8080:80
# ============================================================

apiVersion: v1
kind: Service
metadata:
  name: lms-frontend
  namespace: lms-production
spec:
  type: ClusterIP
  selector:
    app: lms-frontend
  ports:
    - port: 80
      targetPort: 80
