# ============================================================
# NETLIFY CONFIG
# Base directory is frontend/ since we restructured the project
# ============================================================

[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_API_URL = "https://lms-platform-devops.onrender.com/api"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options      = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy      = "no-referrer"
