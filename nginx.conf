# ============================================================
# NGINX CONFIG
# Serves the React SPA — all routes fall back to index.html
# ============================================================

server {
    listen 80;

    # Where the built React files live
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: if file not found, serve index.html
    # This lets React Router handle the routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't serve /api routes from here — backend handles those
    location /api/ {
        return 404;
    }

    # Cache static files (JS, CSS, images) for 1 year
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
