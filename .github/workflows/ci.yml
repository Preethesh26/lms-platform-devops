# ============================================================
# GITHUB ACTIONS — CI/CD PIPELINE
# This is the main pipeline for the live app
#
# What it does on every push:
#   1. Lint and build the frontend
#   2. Check the backend for syntax errors
#
# On push to main branch, it also:
#   3. Builds Docker images and pushes to Docker Hub (preethesh26)
#   4. Triggers Render to redeploy the backend
#   5. Netlify auto-deploys the frontend (no step needed)
# ============================================================

name: CI/CD

on:
  push:
    branches: ['**']   # run on every branch push

jobs:

  # ── Job 1: Lint and build the React frontend ──────────────
  lint-build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint (check code style)
        run: npm run lint

      - name: Build (compile TypeScript + Vite)
        run: npm run build
        env:
          # Use the real Render backend URL for the build
          VITE_API_URL: https://lms-platform-devops.onrender.com/api

  # ── Job 2: Check the backend for errors ───────────────────
  check-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Check for syntax errors
        run: node --check server.js
        working-directory: backend

  # ── Job 3: Build Docker images and push to Docker Hub ─────
  # Only runs on the main branch after jobs 1 and 2 pass
  build-and-deploy:
    needs: [lint-build-frontend, check-backend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Log in to Docker Hub as preethesh26
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: preethesh26
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and push frontend image
      # Tagged with git SHA (permanent) and latest (moving)
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: VITE_API_URL=https://lms-platform-devops.onrender.com/api
          tags: |
            preethesh26/lms-frontend:${{ github.sha }}
            preethesh26/lms-frontend:latest

      # Build and push backend image
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            preethesh26/lms-backend:${{ github.sha }}
            preethesh26/lms-backend:latest

      # Tell Render to pull the new backend image and redeploy
      - name: Trigger Render backend deploy
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

      # Netlify auto-deploys via Git integration — no step needed here
