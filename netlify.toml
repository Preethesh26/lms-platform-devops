# Netlify configuration for LMS Platform

[build]
  # Build command
  command = "npm run build"
  
  # Output directory
  publish = "dist"

[build.environment]
  # Backend API URL
  VITE_API_URL = "https://lms-platform-l92a.onrender.com/api"

# SPA redirect rules
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
